name: Keepalive

on:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Re-enable CodeQL workflow if disabled
        uses: actions/github-script@v7
        with:
          script: |
            const workflowFile = 'codeql.yml';
            const { data: wf } = await github.rest.actions.getWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowFile,
            });

            if (wf.state?.startsWith('disabled')) {
              console.log(`Re-enabling: ${wf.name} (${wf.path})`);
              await github.rest.actions.enableWorkflow({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
              });
              console.log('Done.');
            } else {
              console.log(`No action needed. ${wf.name} is ${wf.state}.`);
            }
