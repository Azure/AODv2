watch_interval_sec: 60
aod_output_dir: /var/log/aod

anomalies:
  smb:
    latency:
      tool: "smbslower"
      mode: "all"              # Options: all, trackonly, excludeonly
      acceptable_count: 10     # number of commands with latency above threshold in X seconds
      default_threshold_ms: 20 # milliseconds, by default applies to all commands
      track_commands:
        - command: SMB2_WRITE
          threshold: 50
      actions:
        dmesg:
        journalctl:
        debugdata:
        stats:
        mounts:
        smbinfo:
        syslogs:
        tcpdump: ["-s", "65536", "-B", "10240", "-C", "2", "-W", "100"]
    sockconn:
      tool: "ss"
      actions:
        dmesg:
        journalctl:
        stats:
        tcpdump:  ["-s", "65536", "-B", "10240", "-C", "2", "-W", "100"]

  nfs:
    latency:
      tool: "nfsslower"
      mode: "all"              # Options: all, trackonly, excludeonly
      acceptable_count: 10     # number of commands with latency above threshold in X seconds
      default_threshold_ms: 50  # milliseconds, by default applies to all commands
      actions:
        dmesg:
        journalctl:
        syslogs:
        trace-cmd: ["-e", "nfs", "-e", "nfs4", "-e", "sunrpc", "-b", "1024"]
    sockconn:
      tool: "ss"
      actions:
        dmesg:
    error:
      tool: "nfsiosnoop"
      acceptable_count: 5     # number of matching error events in watch_interval_sec
      track_commands:         # leave empty to let all NFS commands through
      track_errors:           # at least one of track_commands/track_errors must be non-empty
        - NFS4ERR_BAD_STATEID
        - NFS4ERR_OLD_STATEID
      actions:
        dmesg:
        journalctl:
        syslogs:
        trace-cmd: ["-e", "nfs", "-e", "nfs4", "-e", "sunrpc", "-b", "1024"]

cleanup:
  cleanup_interval_sec: 300     # Interval in seconds to run cleanup
  max_log_age_days: 2           # Maximum age of logs in days
  max_total_log_size_mb: 1024   # Maximum total size of all logs in MB

audit:
  enabled: true

# ** Use either track_commands (trackonly) or exclude_commands (excludeonly).
# Mode type will determine which one is used.
# With Mode type all, track commands with the given thresholds,
# track other commands with the default threshold, and ignore the excluded commands.